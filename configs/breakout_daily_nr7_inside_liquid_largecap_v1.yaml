# NR7 Volatility-Contraction Breakout — v1

strategy:
  id: "breakout.daily.nr7_inside.liquid_largecap.v1"
  family: "breakout"
  template: "daily.nr7_inside"
  variant: "liquid_largecap"
  version: 1
  description: >
    Long-only NR7 volatility-contraction breakout on a liquid large-cap
    universe. Tier 2 strategy-bank candidate.
  enabled: true

  universe_ref: "universe.sp100_liquid.v1"

  parameters:
    range_lookback: 7
    ma_filter_length: 50
    max_hold_days: 3
    max_concurrent_positions: 3
    sizing_rule: "equal_notional"
    per_position_notional_pct: 0.20
    ranking_enabled: true
    ranking_metric: "nr7_range_ascending"

  tempo:
    bar_size: "1D"
    min_hold_days: 1
    max_hold_days: 3

  risk:
    max_position_pct: 0.20
    max_positions: 3
    daily_loss_cap_pct: 0.02
    stop_loss_pct: 0.05

  stage: "backtest"

  backtest:
    commission_per_trade: 0.00
    min_trades_required: 30
    walk_forward_windows: 4

  disable_conditions_additional:
    - "Data cannot identify the entry bar's low for the initial stop."

backtest_results_v1_2026-05-05:
  command: "milodex research screen --strategy-id breakout.daily.nr7_inside.liquid_largecap.v1 --start 2020-01-01 --end 2024-12-31 --initial-equity 1000 --walk-forward-equivalent"
  windows: 4
  oos_aggregate:
    trades: 1024
    total_return_pct: -20.11
    sharpe: -0.9400
    max_drawdown_pct: 21.17
  stability:
    single_window_dependency: false
  promotion_gate_status: "refused"
  notes: >
    Blocked because Sharpe is negative and max drawdown exceeds the 15%
    threshold. The high trade count makes this a strong rejection signal for
    the Phase 1 long-only NR7 adaptation.
