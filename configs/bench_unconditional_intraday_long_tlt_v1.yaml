strategy:
  id: benchmark.unconditional_intraday_long.tlt.v1
  family: benchmark
  template: unconditional_intraday_long
  variant: tlt
  version: 1
  description: 'Benchmark: long SPY from the first bar after the opening range until
    the time-stop bar 5min before close. Every full session. Half-days skipped (matches
    ORB skip behavior). Provides the floor that any intraday SPY signal must beat
    — the unconditional intraday long return after realistic slippage.

    '
  enabled: true
  parameters:
    opening_range_minutes: 30
    exit_minutes_before_close: 5
    per_position_notional_pct: 0.1
  tempo:
    bar_size: 5Min
    min_hold_days: 0
    max_hold_days: 1
  risk:
    max_position_pct: 0.1
    max_positions: 1
    daily_loss_cap_pct: 0.02
    stop_loss_pct: 0.01
  stage: paper
  backtest:
    commission_per_trade: 0.0
    slippage_pct: 0.0005
    min_trades_required: 30
    walk_forward_windows: 4
  disable_conditions_additional: []
  universe:
  - TLT
