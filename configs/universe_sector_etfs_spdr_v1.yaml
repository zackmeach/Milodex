# SPDR Sector ETFs Universe — v1
#
# Frozen universe manifest. Strategies reference this by id; they do not
# inline their own lists. The rules that govern universe construction,
# versioning, and eligibility live in docs/strategy-families.md and
# docs/SRS.md (Data domain); this file carries only the frozen membership.
#
# Any membership change creates a new version. The current version is never
# silently edited in place — see ADR 0015 for the frozen-manifest principle,
# applied here to the universe.

universe:
  id: "universe.sector_etfs_spdr.v1"
  version: 1
  description: >
    The eleven GICS-sector SPDR ETFs (Select Sector SPDR family). Used by
    cross-sectional momentum, channel-breakout, and sector-rotation
    strategies. Chosen for high liquidity, narrow spreads, clean corporate
    actions, and full GICS coverage so cross-sectional ranking spans the
    whole equity market structure rather than a curated subset.
    Subject to the instrument whitelist in ADR 0016.

  # ETFs — eleven GICS sectors (Select Sector SPDR family)
  etfs:
    - "XLB"   # Materials
    - "XLC"   # Communication Services
    - "XLE"   # Energy
    - "XLF"   # Financials
    - "XLI"   # Industrials
    - "XLK"   # Technology
    - "XLP"   # Consumer Staples
    - "XLRE"  # Real Estate
    - "XLU"   # Utilities
    - "XLV"   # Health Care
    - "XLY"   # Consumer Discretionary

  # No single-name stocks — sector ETFs are the unit of analysis for
  # cross-sectional sector strategies.
  stocks: []
