# Phase 1 Curated Universe — v1 (DEPRECATED)
#
# DEPRECATED 2026-05-06. Replaced by universe.curated_largecap.v2 (file
# `universe_curated_largecap_v2.yaml`). The v1 stock list was hand-picked in
# 2026 with full knowledge of 2020-2024 performance and is therefore
# survivorship-biased upward. The v2 manifest applies an ex-ante selection
# rule (S&P 100 constituents at 2019-12-31, market cap >= $100B, ticker
# unchanged across the window) and is `survivorship_corrected: true`.
#
# This file is retained, not deleted, because frozen v1 strategy manifests
# (e.g., the now-demoted meanrev.daily.pullback_rsi2.curated_largecap.v1
# paper-stage record in the event store) reference `universe.phase1.curated.v1`
# by name. Removing this file would break historical-backtest reproducibility
# of those frozen records.
#
# Do NOT add new strategies pointing at this universe — they will inherit
# the survivorship bias. Use `universe.curated_largecap.v2` instead.
#
# Original header below for context:
#
# Frozen universe manifest. Strategies reference this by id; they do not
# inline their own lists. The rules that govern universe construction,
# versioning, and eligibility live in docs/strategy-families.md and
# docs/SRS.md (Data domain); this file carries only the frozen membership.
#
# Any membership change creates a new version (universe_phase1_v2, etc.).
# The current version is never silently edited in place — see ADR 0015 for
# the frozen-manifest principle, applied here to the universe.

universe:
  id: "universe.phase1.curated.v1"
  version: 1
  slippage_pct: 0.0005  # 5 bps — mixed ETF + large-cap single-name universe
  # NOT survivorship-corrected: the 20 single-name large-caps were chosen
  # using a present-day liquidity filter and applied retroactively to the
  # 2020-2024 evaluation windows. Stocks that were not large-cap in 2020
  # are silently included; stocks that left the large-cap tier (or were
  # delisted) are silently excluded. Affected research-target strategies:
  # tsmom, rsi2, bbands. ETFs in this universe are immune (all stable since
  # before 2020). Planned fix: point-in-time membership reconstruction —
  # see docs/RISK_POLICY.md "Known Backtest Limitations and Biases".
  survivorship_corrected: false
  description: >
    Small curated universe of highly liquid U.S. common stocks and plain
    ETFs for Phase 1 research-target strategies. Chosen for stable
    liquidity, clean data, simple corporate actions. Subject to the
    instrument whitelist in ADR 0016.

  # ETFs — broad index, sector, and commodity/bond exposures
  etfs:
    - "SPY"
    - "QQQ"
    - "IWM"
    - "DIA"
    - "XLK"
    - "XLF"
    - "XLE"
    - "XLV"
    - "XLI"
    - "XLP"
    - "XLU"
    - "XLY"
    - "XLB"
    - "XLRE"
    - "SMH"
    - "SOXX"
    - "GLD"
    - "SLV"
    - "TLT"
    - "SHY"

  # Common stocks — large-cap, highly liquid
  stocks:
    - "AAPL"
    - "MSFT"
    - "NVDA"
    - "AMZN"
    - "META"
    - "GOOGL"
    - "TSLA"
    - "JPM"
    - "BAC"
    - "XOM"
    - "CVX"
    - "JNJ"
    - "UNH"
    - "PG"
    - "HD"
    - "COST"
    - "AVGO"
    - "AMD"
    - "NFLX"
    - "WMT"
