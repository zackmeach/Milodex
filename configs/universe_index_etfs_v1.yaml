# Index ETFs Universe — v1
#
# Frozen universe manifest. Strategies reference this by id; they do not
# inline their own lists. The rules that govern universe construction,
# versioning, and eligibility live in docs/strategy-families.md and
# docs/SRS.md (Data domain); this file carries only the frozen membership.
#
# Any membership change creates a new version (universe_index_etfs_v2, etc.).
# The current version is never silently edited in place — see ADR 0015 for
# the frozen-manifest principle, applied here to the universe.

universe:
  id: "universe.index_etfs.v1"
  version: 1
  slippage_pct: 0.0003  # 3 bps — highly-liquid broad-market index ETFs
  description: >
    Four broad-market U.S. equity index ETFs. Used by IBS-style mean-reversion
    strategies that target overshoot/snapback behavior on highly-liquid index
    products where intraday bar location is a reliable oversold signal.
    Subject to the instrument whitelist in ADR 0016.

  # ETFs — broad U.S. equity index exposures
  etfs:
    - "SPY"   # S&P 500
    - "QQQ"   # Nasdaq-100
    - "IWM"   # Russell 2000
    - "DIA"   # Dow Jones Industrial Average

  # No single-name stocks — IBS on individual large-caps is materially
  # noisier than on diversified index baskets (idiosyncratic news drives
  # close-near-low days that don't mean-revert in the published manner).
  stocks: []
