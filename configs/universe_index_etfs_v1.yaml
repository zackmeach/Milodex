# Index ETFs Universe — v1
#
# Frozen universe manifest for broad U.S. index ETFs. Used by the IBS
# (Internal Bar Strength) meanrev template, which is unreliable on
# single names — see docs/strategy-families.md, Template: daily.ibs_lowclose.
#
# Any membership change creates a new version (universe_index_etfs_v2, etc.).
# The current version is never silently edited in place — see ADR 0015.

universe:
  id: "universe.index_etfs.v1"
  version: 1
  description: >
    Four broad U.S. index ETFs (SPY, QQQ, IWM, DIA). Chosen for deep
    liquidity, diversified underlyings that diffuse single-name noise, and
    clean corporate-action histories. Single-name stocks are intentionally
    excluded — IBS signals on individual issues often reflect genuine news
    rather than mean-reverting imbalance.

  etfs:
    - "SPY"
    - "QQQ"
    - "IWM"
    - "DIA"
