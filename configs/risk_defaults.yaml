# Global Risk Defaults
# These guardrails apply above any individual strategy's risk config.
# The risk layer enforces these limits with veto power over all trade execution.
# Human-readable rationale: docs/RISK_POLICY.md

paper_evaluation:
  # Phase 1 default starting paper capital baseline.
  starting_capital_usd: 100000

sizing:
  # Simple fixed-percent sizing on current equity. Not volatility-aware in Phase 1.
  per_position_target_pct: 0.10

kill_switch:
  enabled: true
  # Halt all trading if portfolio drawdown exceeds this threshold
  max_drawdown_pct: 0.10          # 10% portfolio drawdown triggers full stop
  # Require manual re-enablement after a kill switch event
  require_manual_reset: true
  # Scope: Milodex supports both strategy-level and account-level kill switches.
  # See docs/RISK_POLICY.md "Kill-Switch Scope".
  supports_strategy_level: true
  supports_account_level: true

portfolio:
  # Maximum percentage of portfolio in any single position (hard ceiling).
  # Matches per_position_target_pct to prevent one name from dominating.
  max_single_position_pct: 0.10
  # Maximum percentage of portfolio deployed at any time.
  # Phase 1 deliberately keeps at least half in cash.
  max_total_exposure_pct: 0.50
  # Maximum percentage of portfolio in any single sector.
  max_sector_exposure_pct: 0.20
  # Maximum concurrent positions expressing effectively the same trade idea.
  max_correlated_positions_per_idea: 2
  # Maximum number of concurrent open positions across all strategies.
  # Account-scoped: counts every broker position regardless of which strategy
  # opened it (per ADR 0024). When running multiple strategies in one paper
  # account, size this to the SUM of expected concurrent positions across all
  # running strategies — strategy YAML `risk.max_positions` is informational
  # only and does not bind the risk layer.
  max_concurrent_positions: 10

daily_limits:
  # Daily loss is computed as realized + unrealized P&L vs start-of-day equity snapshot.
  # Breach trips the kill switch.
  max_daily_loss_pct: 0.03
  loss_reference: "start_of_day_equity"
  loss_includes: "realized_plus_unrealized"
  # Maximum number of trades per day (prevents runaway logic)
  max_trades_per_day: 20

order_safety:
  # Fat-finger protection: reject any single order exceeding this portfolio %
  max_order_value_pct: 0.15
  # Duplicate-order policy: BLOCK on uncertainty (see docs/RISK_POLICY.md).
  # Detection keys off strategy instance, symbol, side, action type, target qty/exposure, window.
  duplicate_order_window_seconds: 60
  duplicate_block_on_uncertainty: true
  # Reject orders if market data is older than this threshold
  max_data_staleness_seconds: 300

exposure_policy:
  # Declarative policy record; enforcement lives in src/milodex/risk/evaluator.py.
  # Exposure-increasing orders run the full risk/approval/kill-switch check set.
  # Exposure-reducing orders use a more permissive policy because they move
  # toward safety: they are exempt from the max-order-value (fat-finger) cap
  # and the reconciliation-readiness gate. See docs/RISK_POLICY.md
  # "Reducing vs Increasing Exposure".
  reducing_orders_permissive: true
  # DC-1 (2026-06-10): the kill switch is an ABSOLUTE halt — it blocks ALL
  # orders, including reducing sells. The switch fires precisely when trust
  # in execution/state is questionable, and a "reducing" order is only safe
  # if the ledger it reduces against is truthful. The operator exits existing
  # risk deliberately after manual reset.
  reducing_allowed_during_kill_switch: false

backtesting:
  # Minimum fraction of declared-universe symbols that must have bars in the
  # requested window before a backtest is allowed to run.  A symbol with zero
  # rows counts as missing even if the provider returned an empty barset.
  # Override per-strategy via `risk.min_universe_coverage_pct` in the strategy YAML.
  min_universe_coverage_pct: 0.80
  # Fallback slippage when neither the strategy YAML nor the universe YAML
  # declares a slippage_pct.  Universe-specific values take precedence over this.
  # Resolution order: strategy.backtest.slippage_pct → universe.slippage_pct
  #                   → this value → 0.0005 hardcoded fallback.
  slippage_pct_default: 0.0005
