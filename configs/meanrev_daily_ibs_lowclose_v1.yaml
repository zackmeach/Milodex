# Mean-Reversion Daily IBS Low-Close — v1
#
# This file holds ONLY the frozen instance values for this strategy.
# The normative meaning of the `meanrev` family — market behavior exploited,
# semantic invariants, default disable conditions — and the
# `daily.ibs_lowclose` template's entry/exit/ranking rules live in
# docs/strategy-families.md. Do not restate those rules here.
#
# See ADR 0015 for the identifier scheme, version-vs-variant rule, and the
# frozen-manifest requirement that governs promotion.
#
# Research source: Larsson & Lindahl 2013 "Mining for Three Dollars a Day"
# (Quantpedia); Connors *Short Term Trading Strategies That Work* (2008).
# Native daily-swing — no published-edge truncation from adapting to the
# 1-5 day hold window.

strategy:
  id: "meanrev.daily.ibs_lowclose.index_etfs.v1"
  family: "meanrev"
  template: "daily.ibs_lowclose"
  variant: "index_etfs"
  version: 1
  description: >
    Long-only daily mean-reversion on broad U.S. equity index ETFs using
    Internal Bar Strength (IBS) as the oversold signal. Tier 1 strategy bank
    candidate. Family/template spec:
    docs/strategy-families.md#template-meanrevdailyibs_lowclose.
  enabled: true

  # References the index-ETF universe manifest. Strategies do not inline
  # symbol lists — see configs/universe_index_etfs_v1.yaml and SRS R-DAT-016.
  universe_ref: "universe.index_etfs.v1"

  parameters:
    # IBS = (Close - Low) / (High - Low). Threshold 0.2 = "today closed in
    # the lower 20% of today's range." Per Larsson/Lindahl & Connors.
    ibs_entry_threshold: 0.2
    # Trend filter: only enter while the index is in a long-term uptrend.
    ma_filter_length: 200
    # Close-based stop. IBS holds are short (1-3 days), so the stop is tighter
    # than the RSI(2) template's 5%.
    stop_loss_pct: 0.03
    max_hold_days: 3
    # Universe size 4 → cap at 2 to avoid blanket-long exposure on
    # correlated index ETFs.
    max_concurrent_positions: 2
    sizing_rule: "equal_notional"
    per_position_notional_pct: 0.20
    ranking_enabled: true
    ranking_metric: "ibs_ascending"

  tempo:
    bar_size: "1D"
    min_hold_days: 1
    max_hold_days: 3

  risk:
    max_position_pct: 0.20
    max_positions: 2
    daily_loss_cap_pct: 0.02
    stop_loss_pct: 0.03

  stage: "backtest"

  backtest:
    slippage_pct: 0.001
    commission_per_trade: 0.00
    min_trades_required: 30
    walk_forward_windows: 4

  # Additional disable conditions beyond the family defaults (see
  # docs/strategy-families.md#family-meanrev). Family defaults always apply;
  # this list extends them.
  disable_conditions_additional: []

# Backtest results — walk-forward, non-normative reference block per
# research-strategy-bank-roadmap §2.2 step 11. Recorded to make the
# bank's comparison artifact reproducible. Not consumed by the loader.
backtest_results_v1_2026-05-05:
  command: "milodex backtest meanrev.daily.ibs_lowclose.index_etfs.v1 --start 2020-01-01 --end 2024-12-31 --initial-equity 1000 --walk-forward"
  windows: 4
  oos_aggregate:
    trading_days: 892
    trades: 32
    total_return_pct: 0.78
    sharpe: 0.32
    max_drawdown_pct: 1.22
  stability:
    sharpe_min: -0.11
    sharpe_max: 1.31
    sharpe_std: 0.61
    positive_windows: 2
    negative_windows: 1
    single_window_dependency: false
  promotion_gate_status: "refused"  # Sharpe 0.32 < 0.5 threshold (ADR 0020)
  notes: >
    Honest gate refusal. Trade count just clears 30; Sharpe below promotion
    threshold; max drawdown extremely tame (1.22%). The strategy generates
    very few signals — 32 trades over 5 years on 4 ETFs reflects a
    selective entry rule, not a broken one. Stability across windows is
    mixed (sharpe std 0.61, range -0.11..1.31).
