# VWAP Mean-Reversion Intraday SPY — v1  (PAPER-STAGE HARNESS CANARY, lifecycle_exempt)
#
# Overnight intraday-expansion candidate (2026-05-28). Long-only, single-name
# SPY, 5-minute bars, intraday round-trip. Buys when price stretches a
# threshold below the cumulative session VWAP, betting on reversion toward
# VWAP; exits on stop, VWAP touch, or the time-stop before the close.
#
# Honest framing: VWAP mean-reversion on a liquid index ETF is a well-known
# pattern. The open question is whether any edge survives realistic slippage.
# It must be measured against benchmark.unconditional_intraday_long.spy.v1 on
# identical universe + friction (5 bps). See docs/STRATEGY_BANK.md for the
# intraday promotion rubric.
#
# STAGE = paper. Promoted 2026-05-29 via lifecycle_exempt (operator override,
# approved_by=operator-zack) as a deliberate intraday harness-validation canary —
# placed at paper to exercise the intraday paper runner, NOT on statistical merit.
# WF OOS Sharpe was -1.89 (knowingly-losing); the point is mechanics (cadence,
# fills, in-session evaluation, concurrent-fleet behavior), not return. IEX
# data-fidelity is a hard gate before any intraday strategy exits paper; eventual
# demotion to backtest is a future operator call. See docs/STRATEGY_BANK.md
# "Intraday harness-validation canaries" (and INTRADAY_STRATEGY_EXPANSION_AAR.md).
#
# Rules in code: src/milodex/strategies/meanrev_vwap_reversion_intraday.py
# Session/VWAP helpers: src/milodex/strategies/_session_intraday.py

strategy:
  id: "meanrev.vwap_reversion.intraday.spy.v1"
  family: "meanrev"
  template: "vwap_reversion.intraday"
  variant: "spy"
  version: 1
  description: >
    VWAP mean-reversion on SPY, 5-minute bars. Long-only intraday round-trip:
    buy when the close is at least entry_deviation_pct below the cumulative
    session VWAP within the entry window; exit on stop_loss_pct from entry,
    reversion to/above VWAP, or the time-stop before the close. One entry per
    session. Half-day sessions skipped.
  enabled: true

  universe_ref: "universe.spy_only.v1"

  parameters:
    # Wait for the opening range to form before computing/trading VWAP context.
    opening_range_minutes: 30
    # Entry window = [30, 330) min after 9:30 ET → [10:00, 15:00) ET. A long
    # window so below-VWAP stretches anywhere in the session can trigger, while
    # still leaving runway to the time-stop exit.
    entry_window_minutes: 300
    # Enter when the close is >= 0.4% below the cumulative session VWAP.
    entry_deviation_pct: 0.004
    # Cut the loser at 0.5% below the fill price (structural reversion-failed stop).
    stop_loss_pct: 0.005
    # Forced exit 5 min before the close (15:55 ET full / 12:55 ET half-day).
    exit_minutes_before_close: 5
    # 10% of equity into the single SPY position.
    per_position_notional_pct: 0.10

  tempo:
    bar_size: "5Min"
    min_hold_days: 0
    max_hold_days: 1

  risk:
    max_position_pct: 0.10
    max_positions: 1
    daily_loss_cap_pct: 0.02
    # Mirrors parameters.stop_loss_pct — the strategy self-stops; the risk
    # layer's stop_loss_pct is the runtime backstop.
    stop_loss_pct: 0.005

  stage: "paper"

  backtest:
    commission_per_trade: 0.00
    # 5 bps — MUST match the intraday benchmark and ORB so the head-to-head
    # comparison is on identical footing.
    slippage_pct: 0.0005
    min_trades_required: 30
    walk_forward_windows: 4

  disable_conditions_additional: []
