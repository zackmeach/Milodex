strategy:
  id: breakout.opening_range_retest.intraday.dia.v1
  family: breakout
  template: opening_range_retest.intraday
  variant: dia
  version: 1
  description: 'Opening-range retest on DIA, 5-minute bars. Long-only intraday round-trip:
    buy when the 3-phase retest sequence completes — (a) a prior in-window bar broke
    above range_high, (b) a subsequent bar dipped back to <= range_high, (c) the latest
    bar reclaims (close > range_high, low >= range_high * (1-retest_band_pct)). Structural
    stop on range_low re-entry, secondary stop_loss_pct, time-stop before close. One
    entry per session. Half-day sessions skipped.

    '
  enabled: true
  parameters:
    opening_range_minutes: 30
    entry_window_minutes: 90
    retest_band_pct: 0.003
    stop_loss_pct: 0.01
    exit_minutes_before_close: 5
    per_position_notional_pct: 0.1
  tempo:
    bar_size: 5Min
    position_lifecycle: "same_session"
    min_hold_days: 0
    max_hold_days: 1
  risk:
    max_position_pct: 0.1
    max_positions: 1
    daily_loss_cap_pct: 0.02
    stop_loss_pct: 0.01
  stage: backtest
  backtest:
    commission_per_trade: 0.0
    slippage_pct: 0.0005
    min_trades_required: 30
    walk_forward_windows: 4
  disable_conditions_additional: []
  universe:
  - DIA
