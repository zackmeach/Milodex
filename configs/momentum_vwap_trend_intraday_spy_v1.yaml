# VWAP Trend-Continuation Intraday SPY — v1  (PAPER-STAGE HARNESS CANARY, lifecycle_exempt)
#
# Overnight intraday-expansion candidate (2026-05-28). Long-only, single-name
# SPY, 5-minute bars, intraday round-trip. Buys when price holds above the
# cumulative session VWAP with positive momentum and volume confirmation,
# riding the intraday uptrend; exits on stop, VWAP break (trend invalidation),
# or the time-stop before the close.
#
# This is the long-only mirror of meanrev.vwap_reversion.intraday.spy.v1 — it
# rides above-VWAP strength rather than fading below-VWAP weakness, and reuses
# the same session-VWAP helper. The honest benchmark is
# benchmark.unconditional_intraday_long.spy.v1: a long-only trend filter only
# adds value if it beats unconditional intraday long after slippage (5 bps).
#
# STAGE = paper. Promoted 2026-05-29 via lifecycle_exempt (operator override,
# approved_by=operator-zack) as a deliberate intraday harness-validation canary —
# placed at paper to exercise the intraday paper runner, NOT on statistical merit.
# WF OOS Sharpe was -1.79 (knowingly-losing); the point is mechanics (cadence,
# fills, in-session evaluation, concurrent-fleet behavior), not return. IEX
# data-fidelity is a hard gate before any intraday strategy exits paper; eventual
# demotion to backtest is a future operator call. See docs/STRATEGY_BANK.md
# "Intraday harness-validation canaries" (and INTRADAY_STRATEGY_EXPANSION_AAR.md).
#
# Rules in code: src/milodex/strategies/momentum_vwap_trend_intraday.py
# Session/VWAP helpers: src/milodex/strategies/_session_intraday.py

strategy:
  id: "momentum.vwap_trend.intraday.spy.v1"
  family: "momentum"
  template: "vwap_trend.intraday"
  variant: "spy"
  version: 1
  description: >
    VWAP trend-continuation on SPY, 5-minute bars. Long-only intraday
    round-trip: buy when the close is at least min_above_vwap_pct above the
    cumulative session VWAP with positive momentum_lookback_bars momentum and
    volume_factor volume confirmation; exit on stop_loss_pct from entry, a
    close back below VWAP, or the time-stop before the close. One entry per
    session. Half-day sessions skipped.
  enabled: true

  universe_ref: "universe.spy_only.v1"

  parameters:
    # Wait for the opening range to form before computing/trading VWAP context.
    opening_range_minutes: 30
    # Entry window = [30, 150) min after 9:30 ET → [10:00, 12:00) ET. Enter
    # during the morning trend so there is runway to ride into the time-stop.
    entry_window_minutes: 120
    # Price must be at least 0.1% above the cumulative session VWAP.
    min_above_vwap_pct: 0.001
    # Positive momentum: close above the close 6 bars (30 min) ago.
    momentum_lookback_bars: 6
    # Volume confirmation: latest bar volume > 1.2x the prior 6-bar mean.
    volume_factor: 1.2
    # Cut the loser at 0.5% below the fill price.
    stop_loss_pct: 0.005
    # Forced exit 5 min before the close.
    exit_minutes_before_close: 5
    # 10% of equity into the single SPY position.
    per_position_notional_pct: 0.10

  tempo:
    bar_size: "5Min"
    min_hold_days: 0
    max_hold_days: 1

  risk:
    max_position_pct: 0.10
    max_positions: 1
    daily_loss_cap_pct: 0.02
    stop_loss_pct: 0.005

  stage: "paper"

  backtest:
    commission_per_trade: 0.00
    # 5 bps — MUST match the intraday benchmark and the VWAP-revert candidate
    # so all intraday head-to-heads are on identical footing.
    slippage_pct: 0.0005
    min_trades_required: 30
    walk_forward_windows: 4

  disable_conditions_additional: []
