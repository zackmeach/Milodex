# GEM Quartet Universe — v1
#
# Frozen universe manifest. Strategies reference this by id; they do not
# inline their own lists. The rules that govern universe construction,
# versioning, and eligibility live in docs/strategy-families.md and
# docs/SRS.md (Data domain); this file carries only the frozen membership.
#
# Any membership change creates a new version. The current version is never
# silently edited in place — see ADR 0015 for the frozen-manifest principle,
# applied here to the universe.

universe:
  id: "universe.gem_quartet.v1"
  version: 1
  description: >
    The four ETFs Antonacci's Global Equities Momentum (GEM) algorithm
    operates on: SPY (US equities), EFA (developed-market ex-US equities),
    AGG (US aggregate bonds — the relative-momentum third leg), and SHY
    (short Treasuries — the absolute-momentum floor). Subject to the
    instrument whitelist in ADR 0016.

  # ETFs — broad asset-class proxies for GEM
  etfs:
    - "SPY"   # US large-cap equities (risk-on)
    - "EFA"   # Developed-market ex-US equities (risk-on)
    - "AGG"   # US aggregate bonds (risk-on alternative)
    - "SHY"   # Short Treasuries (risk-off floor)

  stocks: []
