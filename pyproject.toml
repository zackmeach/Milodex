[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "milodex"
version = "0.1.0"
description = "A personal, research-led trading system that discovers, validates, deploys, and monitors strategies."
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"

[project.optional-dependencies]
dev = [
    "ruff",
    "pytest",
]

[tool.ruff]
src = ["src"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
