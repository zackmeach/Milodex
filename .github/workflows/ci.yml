name: CI

# Makes the README's "CI fails on regression below the floor" claim real:
# lint with ruff, run the non-integration suite, and enforce the coverage
# ratchet. Runs on windows-latest to match the project's Windows-first
# environment (PySide6/Qt GUI tests need a real display + bundled fonts).
#
# Dependencies install from the committed uv.lock (`uv sync --frozen`) so a
# fresh upstream release can't break a no-code-change PR, and the lockfile
# stops being inert: `--frozen` fails CI when pyproject.toml and uv.lock drift.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv (cached)
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install (locked, editable + dev extra)
        run: uv sync --frozen --extra dev

      - name: Lint and format check
        run: |
          uv run ruff check src/ tests/
          uv run ruff format --check src/ tests/

      # Coverage floor lives in pyproject.toml ([tool.coverage.report] fail_under);
      # pytest-cov fails the run when coverage regresses below it.
      - name: Test (non-integration) with coverage floor
        run: uv run pytest -m "not integration" --cov=src/milodex --cov-report=term-missing
